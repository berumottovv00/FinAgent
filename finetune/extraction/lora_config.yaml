# ── 模型 ────────────────────────────────────────────────────────────────────
model_name_or_path: ../../models/Qwen/Qwen2-1.5B-Instruct

# ── LoRA ────────────────────────────────────────────────────────────────────
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# ── 数据 ────────────────────────────────────────────────────────────────────
train_file: ../../data_preprocessing/processed/extraction/train.jsonl
val_file:   ../../data_preprocessing/processed/extraction/val.jsonl
max_seq_length: 2048

# ── 训练超参 ─────────────────────────────────────────────────────────────────
output_dir: ../../outputs/extraction
num_train_epochs: 3
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
gradient_checkpointing: true
learning_rate: 0.0002
lr_scheduler_type: cosine
warmup_steps: 10
weight_decay: 0.01
fp16: false
bf16: true
dataloader_num_workers: 4

# ── 日志 / 保存 ──────────────────────────────────────────────────────────────
logging_steps: 10
eval_strategy: epoch
save_strategy: epoch
save_total_limit: 2
load_best_model_at_end: true
metric_for_best_model: eval_loss
report_to: none
