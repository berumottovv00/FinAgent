# ── 模型 ────────────────────────────────────────────────────────────────────
model_name_or_path: ../../models/Qwen/Qwen2-1.5B-Instruct

# ── LoRA ────────────────────────────────────────────────────────────────────
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:           # Qwen attention 投影层
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# ── 数据 ────────────────────────────────────────────────────────────────────
train_file: ../../data_preprocessing/processed/summarization/train.jsonl
val_file:   ../../data_preprocessing/processed/summarization/val.jsonl
max_seq_length: 2048

# ── 训练超参 ─────────────────────────────────────────────────────────────────
output_dir: ../../outputs/summarization
num_train_epochs: 3
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 8     # 等效 batch_size=16
learning_rate: 0.0002
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
fp16: false
bf16: true                         # A100/H100 推荐 bf16
dataloader_num_workers: 4

# ── 日志 / 保存 ──────────────────────────────────────────────────────────────
logging_steps: 10
eval_strategy: epoch
save_strategy: epoch
save_total_limit: 2
load_best_model_at_end: true
metric_for_best_model: eval_loss
report_to: none
